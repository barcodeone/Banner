<!DOCTYPE html>
<html lang="ko">
<head>
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta charset="utf-8" />
    <title>Xprinter Header Banner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
        
        html, body {
            margin: 0 !important;
            padding: 0 !important;
            overflow: hidden !important;
            width: 100%;
            height: 100%;
            background-color: transparent;
        }
        .banner-card {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0255b3 0%, #004085 100%);
            border-radius: 4px;
            padding: 0 10px;
            text-decoration: none;
            transition: all 0.2s ease-in-out;
            user-select: none;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        .banner-card:hover {
            filter: brightness(1.08);
            box-shadow: inset 0 0 8px rgba(255, 255, 255, 0.2);
        }
        .icon-container {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            background-color: rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            margin-right: 8px;
            flex-shrink: 0;
        }
        .icon-container svg {
            width: 14px;
            height: 14px;
            fill: #FFFFFF;
        }
        .text-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            overflow: hidden;
        }
        .title {
            font-size: 13.5px;
            font-weight: 700;
            color: #FFFFFF;
            line-height: 1.2;
            white-space: nowrap;
            letter-spacing: -0.3px;
        }
        .desc {
            font-size: 9px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.75);
            margin-top: 1px;
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <a class="banner-card" href="https://xprinter.co.kr" target="_blank" title="한국 Xprinter 공식 쇼핑몰 바로가기">
        <div class="icon-container">
            <!-- 프린터 SVG 아이콘 -->
            <svg viewBox="0 0 24 24">
                <path d="M19 8H5c-1.66 0-3 1.34-3 3v6h4v4h12v-4h4v-6c0-1.66-1.34-3-3-3zm-3 11H8v-5h8v5zm3-7c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm-1-9H6v4h12V3z"/>
            </svg>
        </div>
        <div class="text-container">
            <div class="title">한국 Xprinter</div>
            <div class="desc">공식 홈페이지 바로가기</div>
        </div>
    </a>
</body>
</html>
