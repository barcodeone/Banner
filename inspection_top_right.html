<!DOCTYPE html>
<html lang="ko">
<head>
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta charset="utf-8" />
    <title>Xprinter Header Banner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            margin: 0 !important;
            padding: 0 !important;
            overflow: hidden !important;
            width: 100%;
            height: 100%;
            background-color: transparent;
        }
        a {
            display: block;
            width: 100%;
            height: 100%;
            text-decoration: none;
            outline: none;
        }
        img {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: fill;
            border: none;
            cursor: pointer;
            transition: opacity 0.2s ease;
        }
        img:hover {
            opacity: 0.95;
        }
    </style>
</head>
<body>
    <a href="https://xprinter.co.kr" target="_blank">
        <img id="bannerImg" alt="Xprinter Official Shop" />
    </a>
    <script>
        document.getElementById('bannerImg').src = 'https://barcodeone.github.io/Banner/xprinter_banner.png?t=' + new Date().getTime();
    </script>
</body>
</html>
