<!DOCTYPE html>
<html lang="ko">
<head>
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta charset="utf-8" />
    <title>KingKong Label Header Banner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            margin: 0 !important;
            padding: 0 !important;
            overflow: hidden !important;
            width: 100%;
            height: 100%;
            background-color: transparent;
        }
        a {
            display: block;
            width: 100%;
            height: 100%;
            text-decoration: none;
            outline: none;
        }
        img {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: fill;
            border: none;
            cursor: pointer;
            transition: opacity 0.2s ease;
        }
        img:hover {
            opacity: 0.95;
        }
    </style>
</head>
<body>
    <a href="https://kklabel.co.kr/" target="_blank">
        <img src="https://barcodeone.github.io/Banner/kklabel_banner.png" alt="KingKong Label Shop" />
    </a>
</body>
</html>
