<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8" />
    <title>Xprinter Banner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            margin: 0 !important;
            padding: 0 !important;
            overflow: hidden !important;
            width: 100% !important;
            height: 100% !important;
            background-color: transparent !important;
        }
        a {
            display: block;
            width: 100%;
            height: 100%;
            text-decoration: none;
            outline: none;
        }
        img {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: fill; /* 찌그러짐이나 여백 없이 100% 꽉 채움 */
            border: none;
            cursor: pointer;
            transition: opacity 0.2s ease;
        }
        img:hover {
            opacity: 0.95;
        }
    </style>
</head>
<body>
    <a href="https://smartstore.naver.com/xprinter" target="_blank">
        <img src="https://barcodeone.github.io/Banner/xprinter_banner.png" alt="Xprinter Official Shop" />
    </a>
</body>
</html>
