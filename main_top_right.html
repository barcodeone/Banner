<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8" />
    <title>Premium Multi Banner Bar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            margin: 0 !important;
            padding: 0 !important;
            overflow: hidden !important;
            width: 100%;
            height: 100%;
            background-color: transparent;
        }
        .banner-bar {
            display: flex;
            width: 100%;
            height: 100%;
            gap: 8px; /* 배너 간격 */
            justify-content: space-between;
        }
        .banner-item {
            flex: 1; /* 3개 배너가 동일한 크기 비율로 가로 3분할 매핑 */
            height: 100%;
            text-decoration: none;
            outline: none;
        }
        img {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: fill;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            transition: transform 0.15s ease, opacity 0.15s ease;
        }
        img:hover {
            transform: scale(1.02);
            opacity: 0.95;
        }
    </style>
</head>
<body>
    <div class="banner-bar">
        <!-- 1번째 칸: 킹콩라벨 정품 광고 -->
        <a class="banner-item" href="https://kklabel.co.kr/" target="_blank">
            <img src="kklabel_banner.png" alt="KingKong Label Shop" />
        </a>
        <!-- 2번째 칸: 광고모집 -->
        <a class="banner-item" href="mailto:contact@dream.com?subject=[광고 및 제휴 문의]" target="_blank">
            <img src="advertise_banner.png" alt="Advertise Here" />
        </a>
        <!-- 3번째 칸: 광고모집 -->
        <a class="banner-item" href="mailto:contact@dream.com?subject=[광고 및 제휴 문의]" target="_blank">
            <img src="advertise_banner.png" alt="Advertise Here" />
        </a>
    </div>
</body>
</html>
