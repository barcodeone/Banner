<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8" />
    <title>Premium Multi Banner Bar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            margin: 0 !important;
            padding: 0 !important;
            overflow: hidden !important;
            width: 100%;
            height: 100%;
            background-color: transparent;
        }
        /* IE7/8 호환을 위한 float 컨테이너 구성 */
        .banner-bar {
            width: 100%;
            height: 100%;
            overflow: hidden;
            display: block; /* block으로 명시 */
        }
        /* 100% 호환되는 float 및 % 가로폭 설계 */
        .banner-item {
            position: relative;
            float: left; /* float 정렬 적용 */
            width: 32%; /* 가로 3등분 비율 */
            margin-right: 2%; /* 균등 간격 배분 */
            height: 100%;
            text-decoration: none;
            outline: none;
            border-radius: 8px;
            overflow: hidden;
            border: 1.5px solid #CBD5E1;
            background-color: #F8FAFC;
            display: block;
            border-collapse: collapse;
        }
        /* 3번째 마지막 배너는 마진을 제거하여 100% 라인 딱 맞춤 */
        .banner-item.last {
            margin-right: 0 !important;
        }
        img {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: fill;
            border: 0 !important; /* IE 이미지 테두리 찌꺼기 제거 */
            outline: none;
            cursor: pointer;
            opacity: 0.95;
        }
        /* 세련된 다크 블루 반투명 오버레이 검증 라벨 */
        .banner-badge {
            position: absolute;
            top: 50%;
            left: 50%;
            margin-top: -12px; /* 세로 중앙 정렬 호환 */
            margin-left: -70px; /* 가로 중앙 정렬 호환 */
            width: 140px;
            height: 24px;
            line-height: 22px;
            text-align: center;
            background-color: rgb(15, 23, 42); /* 반투명 불가능할 경우 대비 불투명 처리 */
            background-color: rgba(15, 23, 42, 0.85);
            color: #F1F5F9;
            font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
            font-size: 11px;
            font-weight: bold;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            pointer-events: none;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <div class="banner-bar">
        <!-- 1번째 칸: 광고모집 1 -->
        <a class="banner-item" href="mailto:contact@dream.com?subject=[광고 및 제휴 문의]" target="_blank">
            <img src="https://barcodeone.github.io/Banner/advertise_banner.png" alt="" />
            <span class="banner-badge">광고 영역 1 (256x80)</span>
        </a>
        <!-- 2번째 칸: 광고모집 2 -->
        <a class="banner-item" href="mailto:contact@dream.com?subject=[광고 및 제휴 문의]" target="_blank">
            <img src="https://barcodeone.github.io/Banner/advertise_banner.png" alt="" />
            <span class="banner-badge">광고 영역 2 (256x80)</span>
        </a>
        <!-- 3번째 칸: 광고모집 3 (마지막 칸으로 last 클래스 지정) -->
        <a class="banner-item last" href="mailto:contact@dream.com?subject=[광고 및 제휴 문의]" target="_blank">
            <img src="https://barcodeone.github.io/Banner/advertise_banner.png" alt="" />
            <span class="banner-badge">광고 영역 3 (256x80)</span>
        </a>
    </div>
</body>
</html>
