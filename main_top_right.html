<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8" />
    <title>Premium Multi Banner Bar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            margin: 0 !important;
            padding: 0 !important;
            overflow: hidden !important;
            width: 100%;
            height: 100%;
            background-color: transparent;
        }
        .banner-bar {
            display: flex;
            width: 100%;
            height: 100%;
            gap: 12px; /* 배너 간격 확장 */
            justify-content: space-between;
        }
        .banner-item {
            position: relative; /* 라벨 절대 배치용 */
            flex: 1; /* 3등분 분할 */
            height: 100%;
            text-decoration: none;
            outline: none;
            border-radius: 8px;
            overflow: hidden;
            border: 1.5px solid #CBD5E1; /* 명확한 경계 테두리 */
            background-color: #F8FAFC;
            transition: transform 0.15s ease, border-color 0.15s ease;
        }
        .banner-item:hover {
            transform: scale(1.015);
            border-color: #0284C7;
        }
        img {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: fill;
            border: none;
            cursor: pointer;
            opacity: 0.95;
            transition: opacity 0.15s ease;
        }
        .banner-item:hover img {
            opacity: 1.0;
        }
        /* 세련된 다크 블루 반투명 오버레이 검증 라벨 */
        .banner-badge {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(15, 23, 42, 0.85); /* 슬레이트 다크 */
            color: #F1F5F9;
            font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 0.5px;
            padding: 5px 12px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            pointer-events: none; /* 클릭 이벤트는 A 태그로 통과시킴 */
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <div class="banner-bar">
        <!-- 1번째 칸: 광고모집 1 -->
        <a class="banner-item" href="mailto:contact@dream.com?subject=[광고 및 제휴 문의]" target="_blank">
            <img src="https://barcodeone.github.io/Banner/advertise_banner.png" alt="Advertise Here" />
            <span class="banner-badge">광고 영역 1 (258x80)</span>
        </a>
        <!-- 2번째 칸: 광고모집 2 -->
        <a class="banner-item" href="mailto:contact@dream.com?subject=[광고 및 제휴 문의]" target="_blank">
            <img src="https://barcodeone.github.io/Banner/advertise_banner.png" alt="Advertise Here" />
            <span class="banner-badge">광고 영역 2 (258x80)</span>
        </a>
        <!-- 3번째 칸: 광고모집 3 -->
        <a class="banner-item" href="mailto:contact@dream.com?subject=[광고 및 제휴 문의]" target="_blank">
            <img src="https://barcodeone.github.io/Banner/advertise_banner.png" alt="Advertise Here" />
            <span class="banner-badge">광고 영역 3 (258x80)</span>
        </a>
    </div>
</body>
</html>
