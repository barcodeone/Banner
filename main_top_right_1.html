<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8" />
    <title>Advertise Banner 1</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            margin: 0 !important;
            padding: 0 !important;
            overflow: hidden !important;
            width: 100%;
            height: 100%;
            background-color: transparent;
        }
        a {
            display: block;
            width: 100%;
            height: 100%;
            text-decoration: none;
            outline: none;
        }
        img {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: fill;
            border: 0 !important; /* IE 테두리 제거 */
            outline: none;
            cursor: pointer;
            transition: opacity 0.2s ease;
        }
        img:hover {
            opacity: 0.95;
        }
    </style>
</head>
<body>
    <a href="mailto:contact@dream.com?subject=[광고 및 제휴 문의]" target="_blank">
        <img src="https://barcodeone.github.io/Banner/advertise_banner.png" alt="" />
    </a>
</body>
</html>
