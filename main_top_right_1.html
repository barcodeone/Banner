<!DOCTYPE html>
<html lang="ko">
<head>
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta charset="utf-8" />
    <title>창성제일 배너</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
        
        html, body {
            margin: 0 !important;
            padding: 0 !important;
            overflow: hidden !important;
            width: 100%;
            height: 100%;
            background-color: transparent;
        }
        .banner-card {
            display: flex;
            align-items: center;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #FFFFFF 0%, #FFF9F2 60%, #FFEEDD 100%);
            border-radius: 8px;
            padding: 0 14px;
            text-decoration: none;
            transition: all 0.2s ease-in-out;
            user-select: none;
            border: 1px solid #FFE3CC;
        }
        .banner-card:hover {
            filter: brightness(0.97);
            border-color: #FFC499;
        }
        .icon-container {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            background-color: #FFF0E0;
            border-radius: 50%;
            margin-right: 12px;
            flex-shrink: 0;
            border: 1px solid #FFD4B2;
        }
        .icon-container svg {
            width: 20px;
            height: 20px;
            fill: #EA580C;
        }
        .text-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            overflow: hidden;
        }
        .title {
            font-size: 13.5px;
            font-weight: 700;
            color: #EA580C;
            line-height: 1.3;
            white-space: nowrap;
            text-overflow: ellipsis;
            overflow: hidden;
        }
        .desc {
            font-size: 10.5px;
            font-weight: 500;
            color: #64748B;
            margin-top: 2px;
            white-space: nowrap;
            text-overflow: ellipsis;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <a class="banner-card" href="https://smartstore.naver.com/csjeil" target="_blank" title="창성제일 쇼핑몰 바로가기">
        <div class="icon-container">
            <!-- 상점 SVG 아이콘 -->
            <svg viewBox="0 0 24 24">
                <path d="M20 4H4v2h16V4zm1 10v-2l-1-5H4l-1 5v2h1v6h10v-6h4v6h2v-6h1zm-9 4H6v-4h6v4z"/>
            </svg>
        </div>
        <div class="text-container">
            <div class="title">창성제일</div>
            <div class="desc">정품 라벨지, 리본, 감열지 특가 전문</div>
        </div>
    </a>
</body>
</html>
