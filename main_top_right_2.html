<!DOCTYPE html>
<html lang="ko">
<head>
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta charset="utf-8" />
    <title>국진이 전산소모품 판매 배너</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
        
        html, body {
            margin: 0 !important;
            padding: 0 !important;
            overflow: hidden !important;
            width: 100%;
            height: 100%;
            background-color: transparent;
        }
        .banner-card {
            display: flex;
            align-items: center;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #FFFFFF 0%, #FFF5F5 60%, #FFE3E3 100%);
            border-radius: 8px;
            padding: 0 14px;
            text-decoration: none;
            transition: all 0.2s ease-in-out;
            user-select: none;
            border: 1px solid #FFD8D8;
        }
        .banner-card:hover {
            filter: brightness(0.97);
            border-color: #FFAAAA;
        }
        .icon-container {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            background-color: #FFEAE8;
            border-radius: 50%;
            margin-right: 12px;
            flex-shrink: 0;
            border: 1px solid #FFCACA;
        }
        .icon-container svg {
            width: 20px;
            height: 20px;
            fill: #DC2626;
        }
        .text-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            overflow: hidden;
        }
        .title {
            font-size: 13.5px;
            font-weight: 700;
            color: #DC2626;
            line-height: 1.3;
            white-space: nowrap;
            text-overflow: ellipsis;
            overflow: hidden;
        }
        .desc {
            font-size: 10.5px;
            font-weight: 500;
            color: #64748B;
            margin-top: 2px;
            white-space: nowrap;
            text-overflow: ellipsis;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <a class="banner-card" href="https://smartstore.naver.com/kookjincom" target="_blank" title="'국진이' 전산소모품 판매 쇼핑몰 바로가기">
        <div class="icon-container">
            <!-- 쇼핑카트 SVG 아이콘 -->
            <svg viewBox="0 0 24 24">
                <path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/>
            </svg>
        </div>
        <div class="text-container">
            <div class="title">'국진이' 전산소모품 판매</div>
            <div class="desc">잉크, 토너 및 전산소모품 전문 쇼핑몰</div>
        </div>
    </a>
</body>
</html>
