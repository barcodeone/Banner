<!DOCTYPE html>
<html lang="ko">
<head>
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta charset="utf-8" />
    <title>Xprinter 전문점 배너</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
        
        html, body {
            margin: 0 !important;
            padding: 0 !important;
            overflow: hidden !important;
            width: 100%;
            height: 100%;
            background-color: transparent;
        }
        .banner-card {
            display: flex;
            align-items: center;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #FFFFFF 0%, #F0F7FF 60%, #D8EBFF 100%);
            border-radius: 8px;
            padding: 0 14px;
            text-decoration: none;
            transition: all 0.2s ease-in-out;
            user-select: none;
            border: 1px solid #C4E1FF;
        }
        .banner-card:hover {
            filter: brightness(0.97);
            border-color: #93C5FD;
        }
        .icon-container {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            background-color: #E6F2FF;
            border-radius: 50%;
            margin-right: 12px;
            flex-shrink: 0;
            border: 1px solid #B9DDFF;
        }
        .icon-container svg {
            width: 20px;
            height: 20px;
            fill: #2563EB;
        }
        .text-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            overflow: hidden;
        }
        .title {
            font-size: 13.5px;
            font-weight: 700;
            color: #2563EB;
            line-height: 1.3;
            white-space: nowrap;
            text-overflow: ellipsis;
            overflow: hidden;
        }
        .desc {
            font-size: 10.5px;
            font-weight: 500;
            color: #64748B;
            margin-top: 2px;
            white-space: nowrap;
            text-overflow: ellipsis;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <a class="banner-card" href="https://xprinter.co.kr" target="_blank" title="'Xprinter' 공식 전문점 바로가기">
        <div class="icon-container">
            <!-- 훈장/정품인증 SVG 아이콘 -->
            <svg viewBox="0 0 24 24">
                <path d="M12 2C8.69 2 6 4.69 6 8c0 2.24 1.22 4.19 3 5.22V22l3-2 3 2v-8.78c1.78-1.03 3-2.98 3-5.22 0-3.31-2.69-6-6-6zm0 10c-2.21 0-4-1.79-4-4s1.79-4 4-4 4 1.79 4 4-1.79 4-4 4z"/>
            </svg>
        </div>
        <div class="text-container">
            <div class="title">'Xprinter' 전문점</div>
            <div class="desc">공식 유통 정품 프린터 및 부자재 전문</div>
        </div>
    </a>
</body>
</html>
