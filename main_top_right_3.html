<!DOCTYPE html>
<html lang="ko">
<head>
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta charset="utf-8" />
    <title>킹콩라벨 배너</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
        
        html, body {
            margin: 0 !important;
            padding: 0 !important;
            overflow: hidden !important;
            width: 100%;
            height: 100%;
            background-color: #f4f4f5 !important; /* WPF 창 바탕색과 완벽히 동화하여 모서리 삐침 현상 원천 차단 */
        }
        .banner-card {
            display: flex;
            align-items: center;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #FFFFFF 0%, #F0F4FF 60%, #DCE4FF 100%);
            border-radius: 8px;
            padding: 0 14px;
            text-decoration: none;
            transition: all 0.2s ease-in-out;
            user-select: none;
            border: 1px solid #C5D2FF;
        }
        .banner-card:hover {
            filter: brightness(0.97);
            border-color: #9AB0FF;
        }
        .icon-container {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            background-color: #E8EEFF;
            border-radius: 50%;
            margin-right: 12px;
            flex-shrink: 0;
            border: 1px solid #BCCFFF;
        }
        .icon-container svg {
            width: 20px;
            height: 20px;
            fill: #1E40AF;
        }
        .text-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            overflow: hidden;
        }
        .title {
            font-size: 13.5px;
            font-weight: 700;
            color: #1E40AF;
            line-height: 1.3;
            white-space: nowrap;
            text-overflow: ellipsis;
            overflow: hidden;
        }
        .desc {
            font-size: 10.5px;
            font-weight: 500;
            color: #64748B;
            margin-top: 2px;
            white-space: nowrap;
            text-overflow: ellipsis;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <a class="banner-card" href="https://kklabel.co.kr/" target="_blank" title="킹콩라벨 쇼핑몰 바로가기">
        <div class="icon-container">
            <!-- 라벨 태그 SVG 아이콘 -->
            <svg viewBox="0 0 24 24">
                <path d="M21.41 11.58l-9-9C12.05 2.22 11.55 2 11 2H4c-1.1 0-2 .9-2 2v7c0 .55.22 1.05.59 1.42l9 9c.36.36.86.58 1.41.58.55 0 1.05-.22 1.41-.59l7-7c.37-.36.59-.86.59-1.41 0-.55-.23-1.06-.59-1.42zM5.5 7C4.67 7 4 6.33 4 5.5S4.67 4 5.5 4 7 4.67 7 5.5 6.33 7 5.5 7z"/>
            </svg>
        </div>
        <div class="text-container">
            <div class="title">킹콩라벨</div>
            <div class="desc">프리미엄 바코드 라벨 및 소모품 전문몰</div>
        </div>
    </a>
</body>
</html>
