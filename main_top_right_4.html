<!DOCTYPE html>
<html lang="ko">
<head>
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta charset="utf-8" />
    <title>광고 모집 배너</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
        
        html, body {
            margin: 0 !important;
            padding: 0 !important;
            overflow: hidden !important;
            width: 100%;
            height: 100%;
            background-color: #F8FAFC !important; /* 부모 웰 카드 배경인 #F8FAFC와 완벽 동화하여 모서리 흰색 삐침 방지 */
        }
        .banner-card {
            display: flex;
            align-items: center;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #FFFFFF 0%, #FAF5FF 60%, #EFE5FF 100%);
            border-radius: 8px;
            padding: 0 14px;
            text-decoration: none;
            transition: all 0.2s ease-in-out;
            user-select: none;
            border: 1px solid #E2D0FF;
        }
        .banner-card:hover {
            filter: brightness(0.97);
            border-color: #C899FF;
        }
        .icon-container {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            background-color: #F3EBFF;
            border-radius: 50%;
            margin-right: 12px;
            flex-shrink: 0;
            border: 1px solid #DFCAFF;
        }
        .icon-container svg {
            width: 20px;
            height: 20px;
            fill: #7C3AED;
        }
        .text-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            overflow: hidden;
        }
        .title {
            font-size: 13.5px;
            font-weight: 700;
            color: #7C3AED;
            line-height: 1.3;
            white-space: nowrap;
            text-overflow: ellipsis;
            overflow: hidden;
        }
        .desc {
            font-size: 10.5px;
            font-weight: 500;
            color: #64748B;
            margin-top: 2px;
            white-space: nowrap;
            text-overflow: ellipsis;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <a class="banner-card" href="mailto:kim@endream.com?subject=[광고 및 제휴 문의]" title="광고 및 제휴 제안하기">
        <div class="icon-container">
            <!-- 메가폰/확성기 SVG 아이콘 -->
            <svg viewBox="0 0 24 24">
                <path d="M12 2c-5.52 0-10 4.48-10 10s4.48 10 10 10 10-4.48 10-10-4.48-10-10-10zm2 15h-4v-2h4v2zm0-4h-4v-4h4v4z"/>
            </svg>
        </div>
        <div class="text-container">
            <div class="title">광고 제휴 및 파트너 모집</div>
            <div class="desc">kim@endream.com</div>
        </div>
    </a>
</body>
</html>
